<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #0a1628;
      color: #fff;
      font-family: Arial;
      padding: 20px;
    }
    .chart-wrapper {
      position: relative;
      height: 220px;
      width: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 10px;
      display: inline-block;
      margin: 10px;
    }
    canvas {
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>Teste de Gráficos</h1>
  
  <div class="chart-wrapper">
    <canvas id="chart1"></canvas>
  </div>

  <script>
function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - amt);
  g = Math.max(0, g - amt);
  b = Math.max(0, b - amt);
  return `rgb(${r},${g},${b})`;
}

function desenharPizza3D(canvasId, dados, cores, titulos) {
  const canvas = document.getElementById(canvasId);
  console.log('Canvas:', canvasId, canvas, canvas?.offsetWidth, canvas?.offsetHeight);
  if (!canvas) {
    console.warn('Canvas não encontrado:', canvasId);
    return;
  }
  
  // Garante tamanho mínimo
  if (canvas.offsetWidth === 0) {
    canvas.style.width = '100%';
    canvas.style.minHeight = '220px';
    canvas.style.display = 'block';
  }

  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  const W = canvas.width = Math.max(rect.width,
    canvas.parentElement?.offsetWidth || 280, 280);
  const H = canvas.height = Math.max(rect.height,
    canvas.parentElement?.offsetHeight || 220, 220);
  
  console.log('Tamanho canvas:', W, 'x', H);
  ctx.clearRect(0, 0, W, H);

  const total = dados.reduce((a,b) => a+b, 0);
  if (total <= 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Sem dados', W/2, H/2);
    return;
  }

  // Posição e tamanho — mais vertical
  const cx = W * 0.42;
  const cy = H * 0.56;
  const rx = W * 0.28;
  const ry = rx * 0.32;
  const depth = 36;

  const angles = dados.map(v => (v/total) * Math.PI * 2);
  let startAngle = -Math.PI / 2;

  // Sombra embaixo
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy + depth + 8, rx*0.9, ry*0.6, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.filter = 'blur(8px)';
  ctx.fill();
  ctx.restore();

  // Laterais
  let a = startAngle;
  angles.forEach((angle, i) => {
    const sa = a;
    const ea = a + angle;
    const mid = sa + angle/2;
    if (Math.sin(mid) > -0.1) {
      ctx.beginPath();
      ctx.ellipse(cx, cy + depth, rx, ry, 0, sa, ea);
      const x2 = cx + rx * Math.cos(ea);
      const y2 = cy + depth + ry * Math.sin(ea);
      ctx.lineTo(x2, y2);
      ctx.ellipse(cx, cy + depth, rx, ry, 0, ea, sa, true);
      const x3 = cx + rx * Math.cos(sa);
      const y3 = cy + ry * Math.sin(sa);
      ctx.lineTo(x3, y3);
      ctx.closePath();
      ctx.fillStyle = darken(cores[i], 55);
      ctx.fill();
    }
    a += angle;
  });

  // Face superior de cada fatia
  a = startAngle;
  angles.forEach((angle, i) => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.ellipse(cx, cy, rx, ry, 0, a, a + angle);
    ctx.closePath();

    // Gradiente para dar profundidade
    const mid = a + angle/2;
    const gx = cx + rx * 0.5 * Math.cos(mid);
    const gy = cy + ry * 0.5 * Math.sin(mid);
    const grad = ctx.createRadialGradient(gx, gy, 0, cx, cy, rx);
    grad.addColorStop(0, cores[i]);
    grad.addColorStop(1, darken(cores[i], 30));
    ctx.fillStyle = grad;
    ctx.fill();

    // Borda entre fatias
    ctx.strokeStyle = 'rgba(10,22,40,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    a += angle;
  });

  console.log('Gráfico desenhado com sucesso');
}

// Teste
window.addEventListener('load', () => {
  setTimeout(() => {
    console.log('Desenhando gráfico de teste...');
    desenharPizza3D('chart1', [100, 50], ['#00e6c8', '#ff6b6b'], ['Entrada', 'Saída']);
  }, 100);
});
  </script>
</body>
</html>
